[pytest]
testpaths = tests
python_files = test_*.py
# Explicit testpaths mainly for speed and deliberateness — pytest's default
# collection pattern (test_*.py) wouldn't actually pick up anything under
# app/agents/legacy_data/ (those demo submission files, including one with an
# intentional syntax error, don't match that pattern regardless), but scoping
# to tests/ still avoids pytest walking frontend/, node_modules, and the rest
# of the repo looking for test files that aren't there.
